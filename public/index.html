<!DOCTYPE html>
<html>
<head>
  <title>GitLaTeX IDE</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Home: repo list -->
<div id="home-view" class="view">
  <header id="home-toolbar" class="home-toolbar" role="toolbar">
    <div class="toolbar-left">
      <img src="/favicon.svg" alt="" class="home-brand-icon" width="28" height="28">
      <span class="home-app-name">GitLaTeX IDE</span>
    </div>
    <div class="toolbar-right">
      <button type="button" class="icon-btn" id="open-clone-modal-btn" aria-label="Clone from URL" title="Clone from URL">
        <span class="material-icons">account_tree</span>
      </button>
      <a href="#/settings" class="icon-btn" aria-label="Settings" title="Settings">
        <span class="material-icons">settings</span>
      </a>
    </div>
  </header>
  <main class="home-content">
    <p class="home-subtitle">Clone a repo or open an existing one to start editing.</p>

  <!-- Clone from URL modal -->
  <div id="clone-modal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="clone-modal-title" aria-modal="true">
      <div class="modal-header">
        <h2 id="clone-modal-title">Clone from URL</h2>
        <button type="button" class="modal-close" onclick="closeCloneModal()" aria-label="Close">
          <span class="material-icons">close</span>
        </button>
      </div>
      <div class="modal-body">
        <label for="repoUrl">Repository URL</label>
        <div class="clone-row">
          <input id="repoUrl" type="text" placeholder="https://github.com/user/repo.git" aria-label="Repository URL">
          <button type="button" class="primary btn-clone" onclick="cloneRepoAndRefresh()">Clone</button>
        </div>
      </div>
    </div>
  </div>

    <section class="home-repos">
      <h2>Your repositories</h2>
      <div id="repo-list" class="repo-list"></div>
      <p id="repo-list-empty" class="repo-list-empty hidden">No repositories yet. Clone one above.</p>
    </section>
  </main>
</div>

<!-- Settings -->
<div id="settings-view" class="view hidden">
  <header class="settings-toolbar" role="toolbar">
    <div class="toolbar-left">
      <a href="#/" class="icon-btn" aria-label="Back to home" title="Back to home">
        <span class="material-icons">arrow_back</span>
      </a>
      <span class="settings-title">Settings</span>
    </div>
    <div class="toolbar-right"></div>
  </header>
  <main class="settings-content">
    <section class="settings-body">
      <div class="settings-group">
        <label class="settings-label">Theme</label>
        <div class="theme-options" role="radiogroup" aria-label="Theme">
          <button type="button" class="theme-option" data-theme="light" aria-pressed="false">
            <span class="material-icons">light_mode</span>
            Light
          </button>
          <button type="button" class="theme-option" data-theme="dark" aria-pressed="true">
            <span class="material-icons">dark_mode</span>
            Dark
          </button>
        </div>
      </div>
    </section>
  </main>
</div>

<!-- Editor: full IDE for one repo -->
<div id="editor-view" class="view hidden">
  <header id="topbar" role="toolbar">
    <div class="toolbar-left">
      <button type="button" id="toggleSidebarBtn" class="icon-btn" onclick="toggleSidebar()" aria-label="Toggle file list" title="Toggle file list">
        <span class="material-icons" aria-hidden="true">menu</span>
      </button>
      <a href="#/" class="icon-btn home-link" aria-label="Back to repositories" title="Back to repositories">
        <span class="material-icons" aria-hidden="true">home</span>
      </a>
      <span id="editor-repo-name" class="repo-name"></span>
    </div>
    <div class="toolbar-right">
      <button type="button" onclick="saveCurrentFile()">Save</button>
      <button type="button" class="primary" onclick="compile()">Compile</button>
      <button type="button" onclick="showCompileErrors()">Errors</button>
      <button type="button" onclick="showStatus()">Status</button>
      <button type="button" onclick="showDiff()">Diff</button>
      <button type="button" onclick="commit()">Commit</button>
      <button type="button" onclick="pushChanges()">Push</button>
    </div>
  </header>

  <div id="container">
    <div id="sidebar"></div>
    <div class="resizer resizer-v" id="resizer-sidebar" title="Resize sidebar"></div>
    <div id="editor"></div>
    <div class="resizer resizer-v" id="resizer-pdf" title="Resize editor / PDF"></div>
    <iframe id="pdf"></iframe>
  </div>

  <div class="console-area">
    <div class="console-content">
      <div class="resizer resizer-h" id="resizer-console" title="Resize console"></div>
      <pre id="console"></pre>
    </div>
    <div class="console-tab-anchor">
      <button type="button" class="console-tab" id="console-toggle" aria-label="Toggle console" title="Toggle console">
        <span class="material-icons console-tab-icon">expand_more</span>
        <span class="console-tab-label">Console</span>
      </button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/monaco-editor@latest/min/vs/loader.js"></script>
<script src="app.js"></script>
</body>
</html>
